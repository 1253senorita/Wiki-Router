<!DOCTYPE html>
<html lang="ko">
<head>
    <title>WIKI-ROUTER 🍎 v5.2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* [기존 디자인 값 유지] */
        :root { --bg: #e0e5ec; --dark: #1a1a1a; --bear: #ff4757; --peng: #3498db; }
        body { margin: 0; background: var(--bg); font-family: 'Malgun Gothic', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: #2c3e50; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 4px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .main-app { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; flex-wrap: wrap; }
        .card { flex: 1; min-width: 300px; border-radius: 35px; display: flex; flex-direction: column; box-shadow: 15px 15px 30px #bebebe, -15px -15px 30px #ffffff; overflow: hidden; background: var(--bg); }
        .bear-box { background: var(--dark); border: 3px solid #333; }
        .v-zone { flex: 1; background: #000; margin: 20px; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: inset 0 0 20px #000; }
        .vu { display: flex; align-items: flex-end; gap: 5px; height: 50px; }
        .bar { width: 10px; height: 6px; background: var(--bear); border-radius: 2px; transition: height 0.1s ease; box-shadow: 0 0 10px var(--bear); }
        .b-btn-zone { height: 180px; display: flex; justify-content: center; align-items: center; }
        .b-btn { width: 130px; height: 130px; border-radius: 50%; border: none; background: linear-gradient(145deg, #ff4b2b, #ff416c); color: white; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4); font-size: 1.2rem; transition: 0.1s; }
        #p-trig { width: 200px; height: 200px; border-radius: 50%; border: 12px solid #e0e5ec; background: #e0e5ec; box-shadow: 18px 18px 36px #bebebe, -18px -18px 36px #ffffff; cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; outline: none; transition: 0.1s; }
        #p-trig:active { box-shadow: inset 10px 10px 20px #bebebe, inset -10px -10px 20px #ffffff; transform: scale(0.95); }
        .logs { flex: 1; background: rgba(255,255,255,0.4); border-radius: 25px; padding: 15px; margin: 15px; overflow-y: auto; font-size: 0.9rem; border: 1px solid #ccc; box-shadow: inset 4px 4px 10px #bebebe; }
        .msg { background: #e0e5ec; padding: 12px; border-radius: 18px; margin-bottom: 10px; box-shadow: 5px 5px 10px #bebebe; border-left: 6px solid var(--peng); }
        #unlock { position: fixed; inset: 0; background: radial-gradient(circle, #2c3e50, #000); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: #ffeb3b; cursor: pointer; }

        /* --- 중앙 즉시 반응형 스위치 디자인 유지 --- */
        .switch-container { padding: 20px; background: rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; }
        .slide-track { position: relative; width: 120px; height: 50px; background: #2c3e50; border-radius: 25px; cursor: pointer; border: 2px solid #444; overflow: hidden; }
        .slide-handle { position: absolute; left: 70px; top: 3px; width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55); box-shadow: 2px 2px 5px rgba(0,0,0,0.3); pointer-events: none; }
        .slide-fill { position: absolute; width: 100%; height: 100%; background: #2ecc71; transition: 0.3s; }

        /* --- [신규] 독립 가입 화면 스타일 --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 2000; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .auth-box {
            background: var(--bg); padding: 40px; border-radius: 40px;
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            text-align: center; width: 280px;
        }
        .auth-box input {
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 20px;
            background: var(--bg); box-shadow: inset 6px 6px 12px #bebebe, inset -6px -6px 12px #ffffff;
            outline: none; box-sizing: border-box;
        }
        #join-btn {
            width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 20px;
            background: var(--bear); color: white; font-weight: bold; cursor: pointer;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="color:var(--dark); margin-bottom: 25px; font-size: 2.5rem;">JOIN 🍎</h1>
        
        <input type="text" id="join-id" placeholder="ID 입력">
        <input type="password" id="join-pw" placeholder="PW 입력">

        <div class="button-group" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0;">
            <button onclick="selectMode('DEV_MASTER')" class="neo-btn" style="padding: 10px 5px; font-size: 0.75rem;">호텔객실</button>
            <button onclick="selectMode('GUEST_USER')" class="neo-btn" style="padding: 10px 5px; font-size: 0.75rem;">일반룸</button>
            <button onclick="selectMode('NORMAL_USER')" class="neo-btn" style="padding: 10px 5px; font-size: 0.75rem;">프라이빛</button>
        </div>
        
        <div id="status-display" class="neo-inset-panel" style="width: auto; margin: 15px 0; padding: 10px; font-size: 0.8rem;">
            모드를 선택해 주세요.
        </div>

        <button id="join-btn" style="margin-top: 10px;">시스템 접속</button>
    </div>
</div>



<div id="unlock"><h1>WIKI-ROUTER v5.2</h1><p>[터치하여 오디오 엔진 가동]</p></div>

<header>
    <div>📡 WIKI-ROUTER <span style="opacity: 0.7;">INSTANT SYNC</span></div>
    <div id="status" style="color: #00ff00;">💎 SIO_C: STANDBY</div>
</header>

<main class="main-app">
    <section class="card bear-box">
        <div class="v-zone">
            <div class="vu"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
            <div id="b-stat" style="color:white; font-size:1.2rem; margin-top:15px; font-weight:bold;">READY</div>
        </div>
        <div class="b-btn-zone"><button class="b-btn" id="b-trig">TALK</button></div>
        <div class="switch-container">
            <div id="status-sub" style="color: #00ff00; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold;">💎 ONLINE</div>
            <div class="slide-track" id="master-switch">
                <div id="slide-fill" class="slide-fill"></div>
                <div id="slide-handle" class="slide-handle">📞</div>
            </div>
            <div id="slider-text" style="color: #888; font-size: 0.7rem; margin-top: 8px;">INSTANT SWITCH</div>
        </div>
    </section>

    <section class="card">
        <div style="padding:20px; display:flex; justify-content:space-between; align-items: center;">
            <span>🐧 PENG: SYNC PTT</span>
            <button id="clear-btn" style="border:none; background:none; cursor:pointer; font-size:1.2rem;">🗑️</button>
        </div>
        <div class="p-btn-zone" style="height: 250px; display: flex; justify-content: center; align-items: center;">
            <button id="p-trig"><span style="font-size:5rem;">🐧</span></button>
        </div>
        <div class="logs" id="l-box"></div>
    </section>
</main>

<script>
    /* [통신 및 기존 변수 유지] */
    const socket = io();
    const peer = new Peer({ host: location.hostname, port: location.port || 3000, path: '/peerjs' });
    let myStream, calls = [], rec, chunks = [], isBusy = false;
    let isBearActive = true; 

    /* --- [가입 로직 분리] --- */
    const authScreen = document.getElementById('auth-screen');
    const unlockScreen = document.getElementById('unlock');
    const joinBtn = document.getElementById('join-btn');

    joinBtn.onclick = () => {
        const idVal = document.getElementById('join-id').value;
        if(idVal.trim() === "") return alert("ID를 입력하세요!");
        
        // 1. 가입 창 걷어내기
        authScreen.style.display = 'none';
        // 2. 기존 언락 화면 띄우기 (여기서부터 기존 로직 시작)
        unlockScreen.style.display = 'flex';
    };

    /* --- [기존 로직 유지] --- */
    peer.on('open', (id) => socket.emit('register-peer', id));

    const masterSwitch = document.getElementById('master-switch');
    const handle = document.getElementById('slide-handle');
    const fill = document.getElementById('slide-fill');
    const statusSub = document.getElementById('status-sub');
    const bStat = document.getElementById('b-stat');
    const bTrig = document.getElementById('b-trig');

    masterSwitch.onclick = () => {
        if (isBearActive) {
            isBearActive = false;
            calls.forEach(c => c.close());
            calls = [];
            handle.style.left = '5px';
            handle.innerText = "🔌";
            fill.style.width = '0%';
            fill.style.background = '#ff4757';
            statusSub.innerText = "BEAR-OFFLINE";
            statusSub.style.color = "#ff4757";
            bStat.innerText = "OFF";
            bTrig.style.opacity = "0.3";
            bTrig.style.pointerEvents = "none";
        } else {
            isBearActive = true;
            handle.style.left = '70px';
            handle.innerText = "📞";
            fill.style.width = '100%';
            fill.style.background = '#2ecc71';
            statusSub.innerText = "💎 ONLINE";
            statusSub.style.color = "#00ff00";
            bStat.innerText = "READY";
            bTrig.style.opacity = "1";
            bTrig.style.pointerEvents = "auto";
        }
    };

    unlockScreen.onclick = function() {
        this.style.display = 'none';
        document.getElementById('status').innerText = "💎 ONLINE";
    };

    const startBear = async () => {
        if(!isBearActive || isBusy) return;
        isBusy = true;
        document.getElementById('b-stat').innerText = "STREAMING...";
        if (!myStream) myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        socket.emit('get-peers');
    };

    const startPeng = async () => {
        if(isBusy) return;
        isBusy = true; chunks = [];
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        rec = new MediaRecorder(s, { mimeType: 'audio/webm' });
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            socket.emit('sync-audio-file', { blob: blob });
            addLog("나", URL.createObjectURL(blob), false);
            s.getTracks().forEach(t => t.stop());
        };
        rec.start();
    };

    const stopAll = () => {
        if(!isBusy) return;
        document.getElementById('b-stat').innerText = isBearActive ? "READY" : "OFF";
        if(rec && rec.state === "recording") rec.stop();
        isBusy = false;
    };

    document.getElementById('b-trig').onmousedown = startBear;
    document.getElementById('p-trig').onmousedown = startPeng;
    window.onmouseup = stopAll;
    document.getElementById('b-trig').ontouchstart = startBear;
    document.getElementById('p-trig').ontouchstart = startPeng;
    window.ontouchend = stopAll;

    socket.on('peer-list', (list) => {
        list.forEach(tid => { if(tid !== peer.id) calls.push(peer.call(tid, myStream)); });
    });

    peer.on('call', (c) => {
        c.answer();
        c.on('stream', (s) => { const a = new Audio(); a.srcObject = s; a.play(); });
    });

    socket.on('receive-sync-audio', (d) => {
        const url = URL.createObjectURL(new Blob([d.blob], { type: 'audio/webm' }));
        addLog(d.id, url, true);
        new Audio(url).play().catch(() => {});
    });

    function addLog(id, url, isOther) {
        const d = document.createElement('div');
        d.className = 'msg';
        d.innerHTML = `<strong>${isOther?'🐧':'👤'} ${id}</strong><audio src="${url}" controls style="width:100%;"></audio>`;
        document.getElementById('l-box').prepend(d);
    }

    document.getElementById('clear-btn').onclick = () => {
        socket.emit('clear-logs-signal');
        document.getElementById('l-box').innerHTML = '';
    };
</script>
</body>
</html>
