<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>WIKI-ROUTER 🍎</title>

<style>
:root {
    --bg: #0f1419;
    --card: #1a1f24;
    --accent: #00ff88;
}

/* 🔥 기본 리셋 */
html, body {
    margin: 0;
    padding: 0;
    height: 100dvh;
    overflow: hidden;
    background: var(--bg);
    font-family: sans-serif;
}

/* 🔥 앱 전체 */
#app-container {
    display: flex;
    flex-direction: column;
    height: 100dvh;
}

/* 🔝 상단 */
.shell-top header {
    height: 56px;
    background: #111;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    flex-shrink: 0;
}

/* 📱 메인 영역 */
#app-main-viewport {
    flex: 1;
    overflow: hidden;
    display: flex;
}

/* 각 화면 */
.app-view {
    display: none;
    flex: 1;
    flex-direction: column;
}

.app-view.active {
    display: flex;
}

/* 🔽 하단 */
.shell-bottom-nav {
    height: 60px;
    background: #111;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.nav-btn {
    background: none;
    border: none;
    color: #666;
}

.nav-btn.active {
    color: var(--accent);
}

/* 🔐 로그인 */
.auth-box {
    margin: auto;
    width: 90%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.auth-box input {
    padding: 12px;
    border-radius: 12px;
    border: none;
}

/* 🎙 메인 카드 */
.card {
    background: var(--card);
    margin: 10px;
    border-radius: 20px;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

/* 🔊 PTT 버튼 */
#p-trig {
    width: 45vw;
    height: 45vw;
    max-width: 200px;
    max-height: 200px;
    min-width: 120px;
    min-height: 120px;
    border-radius: 50%;
    border: none;
    background: #222;
    color: white;
}

/* 📜 로그 */
.logs {
    margin-top: 10px;
    padding: 10px;
    background: #000;
    color: #0f0;
    border-radius: 10px;
    max-height: 20dvh;
    overflow-y: auto;
}

/* 🐻 TALK */
.b-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: none;
    background: red;
    color: white;
    margin: 20px auto;
}

/* 📱 작은 화면 대응 */
@media (max-height: 650px) {
    #p-trig {
        width: 110px;
        height: 110px;
    }
}
</style>

</head>

<body>

<div id="app-container">

<!-- 상단 -->

<div class="shell-top">
<header>
<div>📡 WIKI-ROUTER</div>
<div style="color:#00ff88;">ONLINE</div>
</header>
</div>

<!-- 메인 -->

<div id="app-main-viewport">

<!-- 로그인 -->

<div id="auth-screen" class="app-view active">
<div class="auth-box">
<h2>JOIN 🍎</h2>
<input type="text" placeholder="ID">
<input type="password" placeholder="PW">
<button onclick="goMain()">접속</button>
</div>
</div>

<!-- 메인 -->

<div id="main-app-content" class="app-view">

<div class="card">
<div style="display:flex; justify-content:space-between;">
<span>🐧 PTT</span>
<button>🗑️</button>
</div>

<div style="display:flex; justify-content:center; align-items:center; height:200px;">
<button id="p-trig">🐧</button>
</div>

<div class="logs">READY...</div>
</div>

<div class="card">
<div style="text-align:center;">
<div>READY</div>
<button class="b-btn">TALK</button>
</div>
</div>

</div>

</div>

<!-- 하단 -->

<nav class="shell-bottom-nav">
<button class="nav-btn active" onclick="showView('auth-screen', this)">🔑</button>
<button class="nav-btn" onclick="showView('main-app-content', this)">🎙️</button>
</nav>

</div>

<script>
function showView(id, btn){
    document.querySelectorAll('.app-view').forEach(v=>v.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

function goMain(){
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('main-app-content').classList.add('active');
}
</script>

</body>
</html>
